<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧЕСКИ ВАЖНО: Отключаем зум, масштабирование и подгоняем под челки айфонов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram DOOM PRO</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>
    
    <style>
        /* БРОНЯ ОТ СВАЙПОВ: Убиваем все системные скроллы и жесты браузера */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: #000;
            overflow: hidden;
            touch-action: none; /* Жестко блокируем жесты (зум, двойные тапы) */
            overscroll-behavior: none; /* Отключаем pull-to-refresh (обновление свайпом вниз) */
            -webkit-user-select: none; /* Отключаем выделение текста */
            user-select: none;
        }
        
        #jsdos {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <div id="jsdos"></div>
    
    <script>
        const tg = window.Telegram.WebApp;
        
        // 1. Растягиваем интерфейс
        tg.expand();
        
        // 2. САМОЕ ГЛАВНОЕ: Отключаем закрытие свайпом вниз!
        if (tg.isVersionAtLeast("6.9")) {
            tg.disableVerticalSwipes();
        }
        
        // 3. Включаем подтверждение при выходе (если юзер случайно нажал крестик, бот спросит "Точно выйти?")
        tg.enableClosingConfirmation();

        // 4. Запрашиваем настоящий Fullscreen (работает в самых новых версиях Telegram)
        if (tg.requestFullscreen) {
            tg.requestFullscreen();
        }

        emulators.pathPrefix = "./";
        Dos(document.getElementById("jsdos")).run("doom.jsdos");
    </script>
</body>
</html>
