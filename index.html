<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram DOOM MOBILE</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>
    
    <style>
        /* БАЗА: Убиваем все свайпы и выделения */
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0;
            background-color: #000; overflow: hidden;
            touch-action: none; overscroll-behavior: none;
            user-select: none; -webkit-user-select: none;
        }

        /* КОНТЕЙНЕР ИГРЫ */
        #jsdos {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* ИГРА НА ВЕСЬ ЭКРАН (Убираем рамки, растягиваем картинку) */
        canvas {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important; /* Растягивает игру на весь экран телефона */
            image-rendering: pixelated;
        }

        /* ЖЕСТКО СКРЫВАЕМ ВЕСЬ МУСОР ОТ ЭМУЛЯТОРА */
        .emulator-options, .emulator-ui, .jsdos-ui, .emulator-overlay, .emulator-button { 
            display: none !important; opacity: 0 !important; pointer-events: none !important; 
        }

        /* ЗЕЛЕНЫЙ КРЕСТИК ПРИЦЕЛА ПО ЦЕНТРУ */
        .crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; z-index: 50; pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.8);
        }
        .crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; } /* горизонтальная линия */
        .crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }  /* вертикальная линия */

        /* СЛОЙ УПРАВЛЕНИЯ (Поверх игры) */
        #controls {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none; /* Пропускает клики на кнопки */
        }

        /* ЛЕВЫЙ ДЖОЙСТИК */
        #joystick-area {
            position: absolute; bottom: 30px; left: 20px;
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto; /* Джойстик ловит касания */
            backdrop-filter: blur(2px);
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear; /* Плавный возврат стика */
        }

        /* ПРАВЫЕ КНОПКИ (Стрельба и Действие) */
        .action-area {
            position: absolute; bottom: 30px; right: 20px;
            display: flex; gap: 15px; align-items: flex-end;
            pointer-events: auto;
        }
        .btn {
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: white; font-weight: 900; font-family: sans-serif; font-size: 14px;
            backdrop-filter: blur(4px); box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.3);
            transition: transform 0.1s, background 0.1s;
        }
        .btn-use { 
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); margin-bottom: 10px;
        }
        .btn-shoot { 
            width: 80px; height: 80px; background: rgba(255, 50, 50, 0.3); border-color: rgba(255, 50, 50, 0.5); 
            font-size: 18px;
        }
        .btn:active { transform: scale(0.85); }
        .btn-use:active { background: rgba(255, 255, 255, 0.4); }
        .btn-shoot:active { background: rgba(255, 50, 50, 0.6); }

    </style>
</head>
<body>
    <div id="jsdos"></div>
    <div class="crosshair"></div> <!-- Прицел -->
    
    <div id="controls">
        <!-- Джойстик слева -->
        <div id="joystick-area">
            <div id="joystick-stick"></div>
        </div>
        
        <!-- Кнопки справа -->
        <div class="action-area">
            <div class="btn btn-use" id="btn-use">USE</div>
            <div class="btn btn-shoot" id="btn-shoot">FIRE</div>
        </div>
    </div>

    <script>
        // НАСТРОЙКИ ТЕЛЕГРАМА (Растягиваем и блокируем закрытие)
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.isVersionAtLeast("6.9")) tg.disableVerticalSwipes();
        tg.enableClosingConfirmation();

        // ЗАПУСК ИГРЫ
        emulators.pathPrefix = "./";
        Dos(document.getElementById("jsdos")).run("doom.jsdos");

        // --- ЛОГИКА ЭМУЛЯЦИИ КЛАВИАТУРЫ ---
        const KEYS = { UP: 38, DOWN: 40, LEFT: 37, RIGHT: 39, CTRL: 17, SPACE: 32 };

        function triggerKey(keyCode, isDown) {
            const eventType = isDown ? 'keydown' : 'keyup';
            const e = new Event(eventType, { bubbles: true });
            e.keyCode = keyCode; e.which = keyCode;
            document.dispatchEvent(e);
            const canvas = document.querySelector('canvas');
            if (canvas) canvas.dispatchEvent(new Event(eventType, { bubbles: true, keyCode: keyCode }));
        }

        // --- ПРАВЫЕ КНОПКИ ---
        function bindButton(id, keyCode) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerKey(keyCode, true); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); triggerKey(keyCode, false); });
            btn.addEventListener('touchcancel', (e) => { e.preventDefault(); triggerKey(keyCode, false); });
        }
        bindButton('btn-shoot', KEYS.CTRL); // Огонь
        bindButton('btn-use', KEYS.SPACE);  // Открыть дверь

        // --- ЛЕВЫЙ ДЖОЙСТИК (Математика движения) ---
        const joyArea = document.getElementById('joystick-area');
        const joyStick = document.getElementById('joystick-stick');
        
        let joyActive = false;
        let joyCenter = { x: 0, y: 0 };
        const maxRadius = 35; // Насколько далеко можно тянуть стик
        
        // Текущее состояние клавиш джойстика
        let state = { up: false, down: false, left: false, right: false };

        function updateKeys(x, y) {
            const threshold = 15; // Мертвая зона в центре
            
            let newUp = y < -threshold;
            let newDown = y > threshold;
            let newLeft = x < -threshold;
            let newRight = x > threshold;

            // Нажимаем или отпускаем клавиши только если их состояние изменилось
            if (newUp !== state.up) { triggerKey(KEYS.UP, newUp); state.up = newUp; }
            if (newDown !== state.down) { triggerKey(KEYS.DOWN, newDown); state.down = newDown; }
            if (newLeft !== state.left) { triggerKey(KEYS.LEFT, newLeft); state.left = newLeft; }
            if (newRight !== state.right) { triggerKey(KEYS.RIGHT, newRight); state.right = newRight; }
        }

        joyArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            joyActive = true;
            const rect = joyArea.getBoundingClientRect();
            // Запоминаем центр джойстика
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            handleJoyMove(e.touches[0]);
            joyStick.style.transition = 'none'; // Убираем плавность пока палец на экране
        });

        joyArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (joyActive) handleJoyMove(e.touches[0]);
        });

        const resetJoy = (e) => {
            e.preventDefault();
            joyActive = false;
            joyStick.style.transition = 'transform 0.1s linear'; // Возвращаем стик плавно
            joyStick.style.transform = `translate(0px, 0px)`;
            updateKeys(0, 0); // Отпускаем все клавиши движения
        };

        joyArea.addEventListener('touchend', resetJoy);
        joyArea.addEventListener('touchcancel', resetJoy);

        function handleJoyMove(touch) {
            let dx = touch.clientX - joyCenter.x;
            let dy = touch.clientY - joyCenter.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            // Ограничиваем вылет стика за пределы круга
            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }
            
            // Двигаем стик на экране
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Передаем координаты в игру
            updateKeys(dx, dy);
        }
    </script>
</body>
</html>
