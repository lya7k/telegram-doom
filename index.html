<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram 3D Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; font-family: sans-serif; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #look-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: 1; }
        
        /* Измененный прицел */
        .crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; transform: translate(-50%, -50%); border-radius: 50%; box-shadow: 0 0 8px #0f0; z-index: 2; pointer-events: none; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: #0f0; }
        .crosshair::before { top: 50%; left: -10px; width: 6px; height: 2px; transform: translateY(-50%); }
        .crosshair::after { top: 50%; right: -10px; width: 6px; height: 2px; transform: translateY(-50%); }
        
        #hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        #ammo-display { background: rgba(0,0,0,0.5); color: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; backdrop-filter: blur(2px); }
        #weapon-btn { background: rgba(255,255,255,0.2); color: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.5); font-weight: bold; pointer-events: auto; backdrop-filter: blur(2px); }
        
        /* СЧЕТЧИК УБИЙСТВ */
        #kill-counter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 0, 0, 0.4); border: 2px solid rgba(255, 50, 50, 0.8); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10; }

        #joy-left { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; backdrop-filter: blur(2px); z-index: 10; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; }
        
        .action-btn { position: absolute; border-radius: 50%; pointer-events: auto; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; backdrop-filter: blur(2px); z-index: 10; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.85); }
        
        #shoot-btn { bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.4); border: 2px solid rgba(255,50,50,0.8); font-size: 18px; }
        #jump-btn { bottom: 140px; right: 40px; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); font-size: 14px; }
        #reload-btn { bottom: 40px; right: 140px; width: 60px; height: 60px; background: rgba(100,200,255,0.3); border: 2px solid rgba(100,200,255,0.6); font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <div id="look-zone"></div>
        <div class="crosshair"></div>
        
        <div id="kill-counter">УБИТО: 0</div>
        
        <div id="hud-top">
            <div id="ammo-display">ПИСТОЛЕТ</div>
            <div id="weapon-btn">🔄 СМЕНИТЬ</div>
        </div>

        <div id="joy-left"><div id="joy-stick"></div></div>
        
        <div id="shoot-btn" class="action-btn">FIRE</div>
        <div id="jump-btn" class="action-btn">JUMP</div>
        <div id="reload-btn" class="action-btn">RELOAD</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        document.body.addEventListener('pointerdown', () => { if (tg.requestFullscreen && !tg.isFullscreen) tg.requestFullscreen(); }, { once: true });
        if (tg.setHeaderColor) { tg.setHeaderColor('#000000'); tg.setBackgroundColor('#000000'); }
        tg.expand(); if (tg.isVersionAtLeast("6.9")) tg.disableVerticalSwipes(); tg.enableClosingConfirmation();

        // === ОРУЖИЕ (ДОБАВЛЕН УРОН - damage) ===
        const weapons =[
            { name: "ПИСТОЛЕТ", damage: 35, maxAmmo: 12, recoil: 0.05, reloadTime: 1000, fireRate: 300, color: 0x888888, size:[0.08, 0.1, 0.3] },
            { name: "ДРОБОВИК", damage: 100, maxAmmo: 6, recoil: 0.15, reloadTime: 2000, fireRate: 800, color: 0x111111, size:[0.15, 0.1, 0.5] },
            { name: "АВТОМАТ", damage: 20, maxAmmo: 30, recoil: 0.02, reloadTime: 1500, fireRate: 100, color: 0x2e4a2e, size:[0.1, 0.12, 0.45] }
        ];
        let currentWeaponIdx = 0; let ammo = weapons[0].maxAmmo; let isReloading = false; let lastFireTime = 0;
        let kills = 0;

        const ammoDisplay = document.getElementById('ammo-display');
        const killCounter = document.getElementById('kill-counter');

        function updateHUD() {
            if (isReloading) { ammoDisplay.innerText = `ПЕРЕЗАРЯДКА...`; ammoDisplay.style.color = "#ffaa00"; } 
            else {
                const w = weapons[currentWeaponIdx];
                ammoDisplay.innerText = `${w.name}: ${ammo} / ${w.maxAmmo}`;
                ammoDisplay.style.color = ammo === 0 ? "#ff5555" : "#ffffff";
            }
        }
        updateHUD();

        document.getElementById('weapon-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (isReloading) return; 
            currentWeaponIdx = (currentWeaponIdx + 1) % weapons.length;
            ammo = weapons[currentWeaponIdx].maxAmmo;
            updateHUD(); buildWeaponModel();
        });

        document.getElementById('reload-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (isReloading || ammo === weapons[currentWeaponIdx].maxAmmo) return;
            isReloading = true; updateHUD(); weaponBasePos.y = -0.5;
            setTimeout(() => {
                ammo = weapons[currentWeaponIdx].maxAmmo;
                isReloading = false; updateHUD(); weaponBasePos.y = -0.25;
            }, weapons[currentWeaponIdx].reloadTime);
        });

        // === 3D ДВИЖОК ===
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        scene.add(camera);

        const playerHeight = 1.6; camera.position.y = playerHeight;
        let velocityY = 0; let isGrounded = true; const gravity = -25; const jumpStrength = 10; 

        // Оружие в руках
        const weaponGroup = new THREE.Group();
        const weaponBasePos = new THREE.Vector3(0.25, -0.25, -0.4); 
        weaponGroup.position.copy(weaponBasePos);
        camera.add(weaponGroup); 

        const muzzleFlash = new THREE.PointLight(0xffdd00, 0, 10);
        muzzleFlash.position.set(0, 0, -0.5); weaponGroup.add(muzzleFlash);

        let currentWeaponMesh;
        function buildWeaponModel() {
            if (currentWeaponMesh) weaponGroup.remove(currentWeaponMesh);
            const wInfo = weapons[currentWeaponIdx];
            const geo = new THREE.BoxGeometry(wInfo.size[0], wInfo.size[1], wInfo.size[2]);
            const mat = new THREE.MeshLambertMaterial({ color: wInfo.color });
            currentWeaponMesh = new THREE.Mesh(geo, mat);
            currentWeaponMesh.position.z = wInfo.size[2] / 2;
            weaponGroup.add(currentWeaponMesh);
        }
        buildWeaponModel();

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6); light.position.set(0, 20, 0); scene.add(light);

        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat); floor.rotation.x = -Math.PI / 2; scene.add(floor);

        // Расставляем серые стены (препятствия)
        const boxGeo = new THREE.BoxGeometry(2, 4, 2);
        for(let i = 0; i < 30; i++) {
            const boxMat = new THREE.MeshLambertMaterial({ color: 0x555555 });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.set((Math.random() - 0.5) * 60, 2, (Math.random() - 0.5) * 60);
            scene.add(box);
        }

        // === СИСТЕМА ВРАГОВ (ЭТАП 2) ===
        const enemies =[]; // Массив всех живых врагов
        const enemyGeo = new THREE.BoxGeometry(1.2, 2.2, 1.2); // Враг размером с человека

        function spawnEnemy() {
            // Враги ярко-красного цвета
            const enemyMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
            const enemy = new THREE.Mesh(enemyGeo, enemyMat);
            
            // Спавним их где-то далеко
            enemy.position.set((Math.random() - 0.5) * 80, 1.1, (Math.random() - 0.5) * 80);
            
            enemy.health = 100; // Здоровье врага
            scene.add(enemy);
            enemies.push(enemy);
        }

        // Спавним 10 врагов при старте
        for(let i = 0; i < 10; i++) spawnEnemy();

        // === RAYCASTING (СТРЕЛЬБА ЛАЗЕРОМ ПО ВРАГАМ) ===
        const raycaster = new THREE.Raycaster();
        const screenCenter = new THREE.Vector2(0, 0); // Центр экрана (прицел)

        let moveForward = 0; let moveRight = 0; let yaw = 0; let pitch = 0; 

        // УПРАВЛЕНИЕ (сокращено для компактности)
        const joyLeft = document.getElementById('joy-left'); const joyStick = document.getElementById('joy-stick');
        let joyPointerId = null; let joyCenter = { x: 0, y: 0 };
        joyLeft.addEventListener('pointerdown', e => { e.preventDefault(); joyPointerId = e.pointerId; joyLeft.setPointerCapture(joyPointerId); const r = joyLeft.getBoundingClientRect(); joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 }; handleJoyMove(e); joyStick.style.transition='none'; });
        joyLeft.addEventListener('pointermove', e => { if(joyPointerId===e.pointerId){ e.preventDefault(); handleJoyMove(e); }});
        const resetJoy = e => { if(joyPointerId===e.pointerId){ e.preventDefault(); joyPointerId=null; joyStick.style.transition='transform 0.1s'; joyStick.style.transform=`translate(0,0)`; moveForward=0; moveRight=0; }};
        joyLeft.addEventListener('pointerup', resetJoy); joyLeft.addEventListener('pointercancel', resetJoy);
        function handleJoyMove(e) { let dx=e.clientX-joyCenter.x; let dy=e.clientY-joyCenter.y; let dist=Math.sqrt(dx*dx+dy*dy); if(dist>30){dx=(dx/dist)*30;dy=(dy/dist)*30;} joyStick.style.transform=`translate(${dx}px,${dy}px)`; moveRight=dx/30; moveForward=dy/30; }

        const lookZone = document.getElementById('look-zone'); let lookPointerId = null; let lastTouch = {x:0, y:0};
        lookZone.addEventListener('pointerdown', e => { e.preventDefault(); lookPointerId = e.pointerId; lookZone.setPointerCapture(lookPointerId); lastTouch = {x:e.clientX, y:e.clientY}; });
        lookZone.addEventListener('pointermove', e => { if(lookPointerId===e.pointerId){ e.preventDefault(); yaw-=(e.clientX-lastTouch.x)*0.005; pitch-=(e.clientY-lastTouch.y)*0.005; pitch=Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, pitch)); lastTouch={x:e.clientX, y:e.clientY}; }});
        const resetLook = e => { if(lookPointerId===e.pointerId){ e.preventDefault(); lookPointerId=null; }};
        lookZone.addEventListener('pointerup', resetLook); lookZone.addEventListener('pointercancel', resetLook);

        document.getElementById('jump-btn').addEventListener('pointerdown', e => { e.preventDefault(); if(isGrounded){velocityY=jumpStrength; isGrounded=false;} });

        // === ЛОГИКА СТРЕЛЬБЫ С УРОНОМ ===
        document.getElementById('shoot-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const now = Date.now();
            const w = weapons[currentWeaponIdx];
            
            if (isReloading || ammo <= 0) return; 
            if (now - lastFireTime < w.fireRate) return; 
            
            ammo--; lastFireTime = now; updateHUD();
            pitch += w.recoil; yaw += (Math.random() - 0.5) * w.recoil * 0.5;
            weaponGroup.position.z += 0.15; weaponGroup.rotation.x += 0.2; 
            muzzleFlash.intensity = 2;

            // RAYCASTING: Проверяем, попали ли во врага
            raycaster.setFromCamera(screenCenter, camera); // Пускаем луч из камеры прямо по центру
            
            // Находим пересечения луча только с массивом врагов
            const intersects = raycaster.intersectObjects(enemies);
            
            if (intersects.length > 0) {
                // Если луч попал, берем самого первого врага (ближайшего)
                const hitEnemy = intersects[0].object;
                
                // Наносим урон
                hitEnemy.health -= w.damage;
                
                // Визуальный эффект попадания (враг мигает белым)
                hitEnemy.material.color.setHex(0xffffff);
                setTimeout(() => { if(hitEnemy.parent) hitEnemy.material.color.setHex(0xff0000); }, 100);

                // Если враг умер
                if (hitEnemy.health <= 0) {
                    scene.remove(hitEnemy); // Удаляем из 3D-мира
                    enemies.splice(enemies.indexOf(hitEnemy), 1); // Удаляем из массива логики
                    
                    kills++; // Добавляем фраг
                    killCounter.innerText = `УБИТО: ${kills}`;
                    
                    // Чтобы не было скучно, спавним нового врага взамен убитого
                    spawnEnemy();
                }
            }
        });

        // === ИГРОВОЙ ЦИКЛ ===
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            weaponGroup.position.lerp(weaponBasePos, 0.15);
            weaponGroup.rotation.x = THREE.MathUtils.lerp(weaponGroup.rotation.x, 0, 0.15);
            if (muzzleFlash.intensity > 0) muzzleFlash.intensity -= delta * 15; 

            // === ИИ ВРАГОВ (Враги идут на тебя) ===
            enemies.forEach(enemy => {
                // Враг всегда смотрит на игрока
                enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
                
                // Враг ползет к игроку
                const dir = new THREE.Vector3();
                dir.subVectors(camera.position, enemy.position).normalize();
                dir.y = 0; // Чтобы враги не летали по воздуху
                
                // Скорость движения врагов = 2
                enemy.position.addScaledVector(dir, 2 * delta);
            });

            velocityY += gravity * delta;
            camera.position.y += velocityY * delta;
            if (camera.position.y <= playerHeight) { camera.position.y = playerHeight; velocityY = 0; isGrounded = true; }

            const euler = new THREE.Euler(0, 0, 0, 'YXZ'); euler.x = pitch; euler.y = yaw;
            camera.quaternion.setFromEuler(euler);

            const speed = 7 * delta;
            const direction = new THREE.Vector3(); camera.getWorldDirection(direction);
            direction.y = 0; direction.normalize();

            const rightVector = new THREE.Vector3(); rightVector.crossVectors(direction, camera.up).normalize();

            if (isGrounded && (Math.abs(moveForward) > 0.1 || Math.abs(moveRight) > 0.1)) {
                const time = Date.now() * 0.005;
                weaponGroup.position.y = weaponBasePos.y + Math.sin(time) * 0.02;
                weaponGroup.position.x = weaponBasePos.x + Math.cos(time) * 0.01;
            }

            camera.position.addScaledVector(direction, -moveForward * speed);
            camera.position.addScaledVector(rightVector, moveRight * speed);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
