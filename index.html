<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram CS Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- ЗАГРУЗЧИК НАСТОЯЩИХ 3D МОДЕЛЕЙ (GLTF/GLB) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; font-family: Tahoma, sans-serif; }
        #game-canvas { width: 100%; height: 100%; display: block; } 
        
        /* ГЛАВНОЕ МЕНЮ */
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #3a3a3a 0%, #0a0a0a 100%); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-menu h1 { color: #ffa500; font-size: 40px; text-shadow: 0 0 10px #ff8c00; margin-bottom: 50px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        .menu-btn { background: rgba(255, 165, 0, 0.1); border: 2px solid #ffa500; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; margin: 10px; border-radius: 5px; width: 80%; max-width: 300px; text-transform: uppercase; box-shadow: 0 0 10px rgba(255,165,0,0.3); transition: 0.2s; }
        .menu-btn:active { transform: scale(0.95); background: #ffa500; color: black; }
        .menu-btn.disabled { border-color: #555; color: #888; background: rgba(0,0,0,0.5); box-shadow: none; }

        /* ИНТЕРФЕЙС ИГРЫ */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; } 
        #look-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: 1; }
        
        /* Классический прицел CS 1.6 */
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; pointer-events: none; }
        .crosshair::before, .crosshair::after, .crosshair-v::before, .crosshair-v::after { content: ''; position: absolute; background: #0f0; }
        .crosshair::before { top: 0; left: -12px; width: 8px; height: 2px; }
        .crosshair::after { top: 0; right: -4px; width: 8px; height: 2px; }
        .crosshair-v { position: absolute; top: 0; left: 0; }
        .crosshair-v::before { left: 0; top: -12px; width: 2px; height: 8px; }
        .crosshair-v::after { left: 0; bottom: -4px; width: 2px; height: 8px; }
        
        #hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; pointer-events: none; }
        #health-container { width: 150px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); border-radius: 5px; padding: 3px; margin-bottom: 5px; }
        #health-bar { height: 15px; width: 100%; background: linear-gradient(90deg, #ff0000, #ff5555); transition: width 0.2s; }
        #ammo-display { background: rgba(0,0,0,0.5); color: #ffa500; padding: 8px 12px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; font-size: 16px; }
        #weapon-btn { background: rgba(255,255,255,0.1); color: #fff; padding: 10px 15px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.5); font-weight: bold; pointer-events: auto; }
        
        #kill-counter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.6); border: 2px solid #ffa500; color: white; padding: 5px 15px; border-radius: 5px; font-weight: 900; font-size: 18px; z-index: 10; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,0,0,0) 50%, rgba(255,0,0,0.4) 100%); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s; }

        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        #game-over-screen h1 { color: #ff3333; font-size: 40px; margin: 0 0 10px 0; }
        #game-over-screen p { color: white; font-size: 20px; margin: 0 0 30px 0; }
        #restart-btn { background: #ff3333; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 5px; pointer-events: auto; }

        /* УПРАВЛЕНИЕ */
        #joy-left { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; z-index: 10; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; }
        
        .action-btn { position: absolute; border-radius: 50%; pointer-events: auto; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; z-index: 10; transition: 0.1s; border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
        .action-btn:active { transform: scale(0.85); background: rgba(255,255,255,0.3); }
        #shoot-btn { bottom: 40px; right: 40px; width: 80px; height: 80px; font-size: 18px; color: #ffa500; border-color: #ffa500; }
        #jump-btn { bottom: 140px; right: 40px; width: 60px; height: 60px; font-size: 14px; }
        #reload-btn { bottom: 40px; right: 140px; width: 60px; height: 60px; font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-menu">
        <h1>WEB<br>STRIKE</h1>
        <button class="menu-btn" id="btn-endless">Бесконечный режим</button>
        <button class="menu-btn disabled" id="btn-pvp">PvP Режим (Скоро)</button>
    </div>
    
    <div id="ui-layer">
        <div id="damage-overlay"></div>
        <div id="look-zone"></div>
        <div class="crosshair"><div class="crosshair-v"></div></div>
        <div id="kill-counter">ФРАГОВ: 0</div>
        
        <div id="hud-top">
            <div>
                <div id="health-container"><div id="health-bar"></div></div>
                <div id="ammo-display">ПИСТОЛЕТ</div>
            </div>
            <div id="weapon-btn">🔄 СМЕНИТЬ</div>
        </div>

        <div id="joy-left"><div id="joy-stick"></div></div>
        <div id="shoot-btn" class="action-btn">FIRE</div>
        <div id="jump-btn" class="action-btn">JUMP</div>
        <div id="reload-btn" class="action-btn">RELOAD</div>
    </div>

    <div id="game-over-screen">
        <h1>ВЫ МЕРТВЫ</h1>
        <p>Фрагов: <span id="final-score">0</span></p>
        <button id="restart-btn">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) { tg.setHeaderColor('#000000'); tg.setBackgroundColor('#000000'); }
        tg.expand(); if (tg.isVersionAtLeast("6.9")) tg.disableVerticalSwipes(); tg.enableClosingConfirmation();

        let gameState = 'menu'; 
        let playerHealth = 100; let kills = 0;
        
        document.getElementById('btn-pvp').addEventListener('pointerdown', () => alert("PvP Режим в разработке!"));
        document.getElementById('btn-endless').addEventListener('pointerdown', () => {
            if (tg.requestFullscreen && !tg.isFullscreen) tg.requestFullscreen(); 
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            gameState = 'playing';
        });

        const healthBar = document.getElementById('health-bar'); const damageOverlay = document.getElementById('damage-overlay');
        const gameOverScreen = document.getElementById('game-over-screen'); const finalScore = document.getElementById('final-score');
        const killCounter = document.getElementById('kill-counter');

        function takeDamage(amount) {
            if (gameState !== 'playing') return; playerHealth -= amount; if (playerHealth < 0) playerHealth = 0;
            healthBar.style.width = playerHealth + '%';
            damageOverlay.style.opacity = 1; setTimeout(() => { damageOverlay.style.opacity = 0; }, 150);
            if (playerHealth === 0) {
                gameState = 'gameover'; finalScore.innerText = kills; gameOverScreen.style.opacity = 1; gameOverScreen.style.pointerEvents = 'auto';
                joyPointerId = null; lookPointerId = null; moveForward = 0; moveRight = 0;
            }
        }

        document.getElementById('restart-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); playerHealth = 100; healthBar.style.width = '100%'; kills = 0; killCounter.innerText = `ФРАГОВ: 0`;
            weapons[0].reserve = 48; weapons[1].reserve = 18; weapons[2].reserve = 90;
            ammo = weapons[currentWeaponIdx].maxAmmo; isReloading = false; updateHUD();
            gameOverScreen.style.opacity = 0; gameOverScreen.style.pointerEvents = 'none';
            camera.position.set(0, playerHeight, 0); yaw = 0; pitch = 0;
            enemies.forEach(e => scene.remove(e)); enemies.length = 0;
            for(let i = 0; i < 15; i++) spawnEnemy();
            gameState = 'playing';
        });

        // === ОРУЖИЕ (Отдача уменьшена!) ===
        const weapons =[
            { name: "ПИСТОЛЕТ", damage: 35, maxAmmo: 12, reserve: 48, recoil: 0.015, reloadTime: 1000, fireRate: 300, color: 0x888888, size:[0.08, 0.1, 0.3] },
            { name: "ДРОБОВИК", damage: 100, maxAmmo: 6, reserve: 18, recoil: 0.04, reloadTime: 2000, fireRate: 800, color: 0x333333, size:[0.15, 0.1, 0.5] },
            { name: "АВТОМАТ", damage: 20, maxAmmo: 30, reserve: 90, recoil: 0.008, reloadTime: 1500, fireRate: 100, color: 0x2e4a2e, size:[0.1, 0.12, 0.45] }
        ];
        let currentWeaponIdx = 0; let ammo = weapons[0].maxAmmo; let isReloading = false; let lastFireTime = 0;
        const ammoDisplay = document.getElementById('ammo-display');

        function updateHUD() {
            if (isReloading) { ammoDisplay.innerText = `ПЕРЕЗАРЯДКА...`; ammoDisplay.style.color = "#ffaa00"; } 
            else { const w = weapons[currentWeaponIdx]; ammoDisplay.innerText = `${w.name}: ${ammo} | ${w.reserve}`; ammoDisplay.style.color = ammo === 0 ? "#ff5555" : "#ffa500"; }
        }
        updateHUD();

        document.getElementById('weapon-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (isReloading || gameState !== 'playing') return; 
            currentWeaponIdx = (currentWeaponIdx + 1) % weapons.length;
            ammo = weapons[currentWeaponIdx].maxAmmo; updateHUD(); buildWeaponModel(); 
        });

        document.getElementById('reload-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); const w = weapons[currentWeaponIdx];
            if (isReloading || ammo === w.maxAmmo || w.reserve <= 0 || gameState !== 'playing') return;
            let needed = w.maxAmmo - ammo; if (needed > w.reserve) needed = w.reserve; 
            isReloading = true; updateHUD(); weaponBasePos.y = -0.5; 
            setTimeout(() => { ammo += needed; w.reserve -= needed; isReloading = false; updateHUD(); weaponBasePos.y = -0.25; }, w.reloadTime);
        });

        // === 3D ДВИЖОК И СВЕТЛОЕ ОСВЕЩЕНИЕ (CS STYLE) ===
        const scene = new THREE.Scene(); 
        scene.background = new THREE.Color(0x87CEEB); // Голубое небо
        scene.fog = new THREE.Fog(0x87CEEB, 20, 80); // Легкая дымка вдалеке

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); scene.add(camera);
        const playerHeight = 1.6; camera.position.y = playerHeight;
        let velocityY = 0; let isGrounded = true; const gravity = -25; const jumpStrength = 10; 

        // Свет как днем на de_dust2
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffee, 0.8);
        sunLight.position.set(50, 100, 50); scene.add(sunLight);

        // === ОРУЖИЕ В РУКАХ ===
        const weaponGroup = new THREE.Group(); const weaponBasePos = new THREE.Vector3(0.25, -0.25, -0.4); 
        weaponGroup.position.copy(weaponBasePos); camera.add(weaponGroup); 
        const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 10); muzzleFlash.position.set(0, 0, -0.5); weaponGroup.add(muzzleFlash);

        let currentWeaponMesh;
        function buildWeaponModel() {
            if (currentWeaponMesh) weaponGroup.remove(currentWeaponMesh);
            const wInfo = weapons[currentWeaponIdx];
            const geo = new THREE.BoxGeometry(wInfo.size[0], wInfo.size[1], wInfo.size[2]);
            // МАГИЯ: depthTest = false делает так, что пушка НИКОГДА не проваливается в стены!
            const mat = new THREE.MeshLambertMaterial({ color: wInfo.color, depthTest: false }); 
            currentWeaponMesh = new THREE.Mesh(geo, mat); currentWeaponMesh.position.z = wInfo.size[2] / 2; 
            currentWeaponMesh.renderOrder = 999; // Рисуем поверх всего
            weaponGroup.add(currentWeaponMesh);
        }
        buildWeaponModel();

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // === АРЕНА И ЯЩИКИ ===
        const arenaSize = 80;
        // Светлый песочный/бетонный пол
        const floorGeo = new THREE.PlaneGeometry(arenaSize, arenaSize); 
        const floorMat = new THREE.MeshLambertMaterial({ color: 0xd2b48c }); // Цвет песка
        const floor = new THREE.Mesh(floorGeo, floorMat); floor.rotation.x = -Math.PI / 2; scene.add(floor);

        // === НАСТОЯЩИЕ КОЛЛИЗИИ (AABB) ===
        const obstacleBoxes =[]; // Массив физических коробок укрытий

        // Расставляем ящики (Crates) случайно, но не стенами
        const crateGeo = new THREE.BoxGeometry(3, 3, 3);
        const crateMat = new THREE.MeshLambertMaterial({ color: 0x8b5a2b }); // Деревянный ящик

        for(let i=0; i<20; i++) {
            const crate = new THREE.Mesh(crateGeo, crateMat);
            let px = (Math.random() - 0.5) * (arenaSize - 10);
            let pz = (Math.random() - 0.5) * (arenaSize - 10);
            if(Math.abs(px) < 8 && Math.abs(pz) < 8) px += 15; // Центр свободен
            
            crate.position.set(px, 1.5, pz);
            scene.add(crate);
            
            // Создаем физическую невидимую коробку для этого ящика
            const box3 = new THREE.Box3().setFromObject(crate);
            obstacleBoxes.push(box3);
        }

        // Физика игрока
        const playerBox = new THREE.Box3();
        const playerSize = new THREE.Vector3(1.2, 2.0, 1.2); // Достаточно толстый, чтобы камера не лезла в стены

        function checkCollision(nx, nz) {
            // Перемещаем физическую коробку игрока в новую точку
            playerBox.setFromCenterAndSize(new THREE.Vector3(nx, 1.0, nz), playerSize);
            // Проверяем, пересекается ли она с любым ящиком
            for(let box of obstacleBoxes) {
                if(playerBox.intersectsBox(box)) return true;
            }
            return false;
        }

        // === ЗАГРУЗКА 3D МОДЕЛЕЙ (CS 1.6 STYLE) ===
        const gltfLoader = new THREE.GLTFLoader();
        let zombieModelTemplate = null;

        // Создаем "Заглушку" на случай, если файла модели нет
        const dummyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.8, 16);
        const dummyMat = new THREE.MeshLambertMaterial({ color: 0x3d5c3a }); // Цвет зомби

        // Пытаемся загрузить красивую модель. Если файла zombie.glb нет на сервере - используем цилиндр.
        gltfLoader.load('zombie.glb', function(gltf) {
            zombieModelTemplate = gltf.scene;
            // Масштабируем, если модель слишком большая
            zombieModelTemplate.scale.set(1, 1, 1);
        }, undefined, function(error) {
            console.log("3D модель зомби не найдена. Использую заглушку.");
        });

        const enemies =[]; 
        function spawnEnemy() {
            const enemyGroup = new THREE.Group();
            
            if (zombieModelTemplate) {
                // Если файл загрузился - клонируем красивую модель
                const realZombie = zombieModelTemplate.clone();
                enemyGroup.add(realZombie);
            } else {
                // Если файла нет - ставим цилиндрический манекен (не кубики!)
                const dummy = new THREE.Mesh(dummyGeo, dummyMat);
                dummy.position.y = 0.9;
                enemyGroup.add(dummy);
            }

            enemyGroup.health = 100; enemyGroup.lastAttack = 0; 

            let ex, ez;
            do { ex = (Math.random() - 0.5) * (arenaSize - 4); ez = (Math.random() - 0.5) * (arenaSize - 4); } 
            while (Math.abs(ex) < 15 && Math.abs(ez) < 15);

            enemyGroup.position.set(ex, 0, ez);
            scene.add(enemyGroup); enemies.push(enemyGroup);
        }
        for(let i = 0; i < 15; i++) spawnEnemy(); 

        const raycaster = new THREE.Raycaster(); const screenCenter = new THREE.Vector2(0, 0);
        let moveForward = 0; let moveRight = 0; let yaw = 0; let pitch = 0; 

        // === УПРАВЛЕНИЕ ===
        const joyLeft = document.getElementById('joy-left'); const joyStick = document.getElementById('joy-stick');
        let joyPointerId = null; let joyCenter = { x: 0, y: 0 };
        joyLeft.addEventListener('pointerdown', e => { e.preventDefault(); if(gameState !== 'playing') return; joyPointerId = e.pointerId; joyLeft.setPointerCapture(joyPointerId); const r = joyLeft.getBoundingClientRect(); joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 }; handleJoyMove(e); joyStick.style.transition='none'; });
        joyLeft.addEventListener('pointermove', e => { if(joyPointerId===e.pointerId){ e.preventDefault(); handleJoyMove(e); }});
        const resetJoy = e => { if(joyPointerId===e.pointerId){ e.preventDefault(); joyPointerId=null; joyStick.style.transition='transform 0.1s'; joyStick.style.transform=`translate(0,0)`; moveForward=0; moveRight=0; }};
        joyLeft.addEventListener('pointerup', resetJoy); joyLeft.addEventListener('pointercancel', resetJoy);
        function handleJoyMove(e) { if(gameState !== 'playing') return; let dx=e.clientX-joyCenter.x; let dy=e.clientY-joyCenter.y; let dist=Math.sqrt(dx*dx+dy*dy); if(dist>30){dx=(dx/dist)*30;dy=(dy/dist)*30;} joyStick.style.transform=`translate(${dx}px,${dy}px)`; moveRight=dx/30; moveForward=dy/30; }

        const lookZone = document.getElementById('look-zone'); let lookPointerId = null; let lastTouch = {x:0, y:0};
        lookZone.addEventListener('pointerdown', e => { e.preventDefault(); if(gameState !== 'playing') return; lookPointerId = e.pointerId; lookZone.setPointerCapture(lookPointerId); lastTouch = {x:e.clientX, y:e.clientY}; });
        lookZone.addEventListener('pointermove', e => { if(lookPointerId===e.pointerId){ e.preventDefault(); if(gameState !== 'playing') return; yaw-=(e.clientX-lastTouch.x)*0.005; pitch-=(e.clientY-lastTouch.y)*0.005; pitch=Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, pitch)); lastTouch={x:e.clientX, y:e.clientY}; }});
        const resetLook = e => { if(lookPointerId===e.pointerId){ e.preventDefault(); lookPointerId=null; }};
        lookZone.addEventListener('pointerup', resetLook); lookZone.addEventListener('pointercancel', resetLook);

        document.getElementById('jump-btn').addEventListener('pointerdown', e => { e.preventDefault(); if(isGrounded && gameState === 'playing'){velocityY=jumpStrength; isGrounded=false;} });

        document.getElementById('shoot-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (gameState !== 'playing' || isReloading) return;
            const now = Date.now(); const w = weapons[currentWeaponIdx];
            if (ammo <= 0) return;
            if (now - lastFireTime < w.fireRate) return; 
            
            ammo--; lastFireTime = now; updateHUD();
            pitch += w.recoil; yaw += (Math.random() - 0.5) * w.recoil * 0.5;
            weaponGroup.position.z += 0.15; weaponGroup.rotation.x += 0.1; muzzleFlash.intensity = 2;

            raycaster.setFromCamera(screenCenter, camera);
            const intersects = raycaster.intersectObjects(enemies, true); 
            if (intersects.length > 0) {
                // Находим главную группу врага
                let hitEnemy = intersects[0].object;
                while(hitEnemy.parent && hitEnemy.parent.type !== 'Scene' && hitEnemy.health === undefined) {
                    hitEnemy = hitEnemy.parent;
                }
                
                if (hitEnemy.health !== undefined) {
                    hitEnemy.health -= w.damage;
                    
                    if (hitEnemy.health <= 0) {
                        scene.remove(hitEnemy); enemies.splice(enemies.indexOf(hitEnemy), 1);
                        kills++; killCounter.innerText = `ФРАГОВ: ${kills}`; spawnEnemy();
                    }
                }
            }
        });

        // === ИГРОВОЙ ЦИКЛ ===
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const now = Date.now();

            if (gameState === 'playing') {
                weaponGroup.position.lerp(weaponBasePos, 0.15); weaponGroup.rotation.x = THREE.MathUtils.lerp(weaponGroup.rotation.x, 0, 0.15);
                if (muzzleFlash.intensity > 0) muzzleFlash.intensity -= delta * 15; 

                // ВРАГИ
                enemies.forEach((enemy, index) => {
                    enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
                    const distToPlayer = camera.position.distanceTo(enemy.position);

                    if (distToPlayer > 1.5) {
                        let dir = new THREE.Vector3().subVectors(camera.position, enemy.position);
                        dir.y = 0; dir.normalize();
                        enemy.position.addScaledVector(dir, 3.0 * delta); // Бегут к тебе
                    } else {
                        if (now - enemy.lastAttack > 1000) {
                            takeDamage(15); enemy.lastAttack = now;
                            // Анимация укуса
                            enemy.position.addScaledVector(new THREE.Vector3().subVectors(camera.position, enemy.position).normalize(), 0.5);
                            setTimeout(() => { if(enemy.parent) enemy.position.addScaledVector(new THREE.Vector3().subVectors(camera.position, enemy.position).normalize(), -0.5); }, 100);
                        }
                    }
                });

                velocityY += gravity * delta; camera.position.y += velocityY * delta;
                if (camera.position.y <= playerHeight) { camera.position.y = playerHeight; velocityY = 0; isGrounded = true; }

                const euler = new THREE.Euler(0, 0, 0, 'YXZ'); euler.x = pitch; euler.y = yaw; camera.quaternion.setFromEuler(euler);

                const speed = 7 * delta;
                const direction = new THREE.Vector3(); camera.getWorldDirection(direction); direction.y = 0; direction.normalize();
                const rightVector = new THREE.Vector3(); rightVector.crossVectors(direction, camera.up).normalize();

                if (isGrounded && (Math.abs(moveForward) > 0.1 || Math.abs(moveRight) > 0.1)) {
                    const time = Date.now() * 0.005; weaponGroup.position.y = weaponBasePos.y + Math.sin(time) * 0.02; weaponGroup.position.x = weaponBasePos.x + Math.cos(time) * 0.01;
                }

                let nextX = camera.position.x - moveForward * speed * direction.x + moveRight * speed * rightVector.x;
                let nextZ = camera.position.z - moveForward * speed * direction.z + moveRight * speed * rightVector.z;
                
                // Коллизии (Игрок теперь скользит вдоль ящиков, а не застревает намертво!)
                if (!checkCollision(nextX, camera.position.z)) camera.position.x = nextX;
                if (!checkCollision(camera.position.x, nextZ)) camera.position.z = nextZ;
                
                const bound = (arenaSize / 2) - 1.5;
                if (camera.position.x > bound) camera.position.x = bound; if (camera.position.x < -bound) camera.position.x = -bound;
                if (camera.position.z > bound) camera.position.z = bound; if (camera.position.z < -bound) camera.position.z = -bound;
            }

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
