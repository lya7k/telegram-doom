<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Telegram 3D Shooter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; user-select: none; -webkit-user-select: none; font-family: sans-serif; }
        #game-canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; } 
        
        /* === ГЛАВНОЕ МЕНЮ === */
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2a0000 0%, #000000 100%); z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-menu h1 { color: #ff3333; font-size: 45px; text-shadow: 0 0 20px #ff0000; margin-bottom: 50px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        .menu-btn { background: rgba(255, 50, 50, 0.2); border: 2px solid #ff3333; color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; margin: 10px; border-radius: 10px; width: 80%; max-width: 300px; text-transform: uppercase; box-shadow: 0 0 15px rgba(255,0,0,0.5); transition: 0.2s; }
        .menu-btn:active { transform: scale(0.95); background: #ff3333; }
        .menu-btn.disabled { border-color: #555; color: #888; background: rgba(0,0,0,0.5); box-shadow: none; }

        /* === ИНТЕРФЕЙС ИГРЫ === */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; } /* Скрыт до старта */
        #look-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: auto; z-index: 1; }
        
        .crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; transform: translate(-50%, -50%); border-radius: 50%; box-shadow: 0 0 8px #0f0; z-index: 2; pointer-events: none; }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: #0f0; }
        .crosshair::before { top: 50%; left: -10px; width: 6px; height: 2px; transform: translateY(-50%); }
        .crosshair::after { top: 50%; right: -10px; width: 6px; height: 2px; transform: translateY(-50%); }
        
        #hud-top { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; pointer-events: none; }
        #health-container { width: 150px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 3px; backdrop-filter: blur(2px); margin-bottom: 5px; }
        #health-bar { height: 15px; width: 100%; background: linear-gradient(90deg, #ff0000, #ff5555); border-radius: 4px; transition: width 0.2s; }
        #ammo-display { background: rgba(0,0,0,0.5); color: #fff; padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font-weight: bold; backdrop-filter: blur(2px); font-size: 14px; }
        #weapon-btn { background: rgba(255,255,255,0.2); color: #fff; padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.5); font-weight: bold; pointer-events: auto; backdrop-filter: blur(2px); }
        
        #kill-counter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255, 0, 0, 0.4); border: 2px solid rgba(255, 50, 50, 0.8); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10; }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,0,0,0) 50%, rgba(255,0,0,0.6) 100%); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.1s; }

        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; opacity: 0; pointer-events: none; transition: opacity 0.5s; backdrop-filter: blur(5px); }
        #game-over-screen h1 { color: #ff3333; font-size: 40px; margin: 0 0 10px 0; text-transform: uppercase; text-shadow: 0 0 15px #ff0000; }
        #game-over-screen p { color: white; font-size: 20px; margin: 0 0 30px 0; }
        #restart-btn { background: #ff3333; color: white; border: none; padding: 15px 40px; font-size: 20px; font-weight: bold; border-radius: 10px; box-shadow: 0 5px 15px rgba(255,0,0,0.4); pointer-events: auto; }
        #restart-btn:active { transform: scale(0.95); background: #cc0000; }

        #joy-left { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; backdrop-filter: blur(2px); z-index: 10; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); pointer-events: none; }
        
        .action-btn { position: absolute; border-radius: 50%; pointer-events: auto; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; backdrop-filter: blur(2px); z-index: 10; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.85); }
        #shoot-btn { bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,50,50,0.4); border: 2px solid rgba(255,50,50,0.8); font-size: 18px; }
        #jump-btn { bottom: 140px; right: 40px; width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); font-size: 14px; }
        #reload-btn { bottom: 40px; right: 140px; width: 60px; height: 60px; background: rgba(100,200,255,0.3); border: 2px solid rgba(100,200,255,0.6); font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-menu">
        <h1>MARS<br>SURVIVOR</h1>
        <button class="menu-btn" id="btn-endless">Бесконечный режим</button>
        <button class="menu-btn disabled" id="btn-pvp">PvP Режим (Скоро)</button>
    </div>
    
    <!-- ИНТЕРФЕЙС (Скрыт в меню) -->
    <div id="ui-layer">
        <div id="damage-overlay"></div>
        <div id="look-zone"></div>
        <div class="crosshair"></div>
        <div id="kill-counter">УБИТО: 0</div>
        
        <div id="hud-top">
            <div>
                <div id="health-container"><div id="health-bar"></div></div>
                <div id="ammo-display">ПИСТОЛЕТ</div>
            </div>
            <div id="weapon-btn">🔄 СМЕНИТЬ</div>
        </div>

        <div id="joy-left"><div id="joy-stick"></div></div>
        
        <div id="shoot-btn" class="action-btn">FIRE</div>
        <div id="jump-btn" class="action-btn">JUMP</div>
        <div id="reload-btn" class="action-btn">RELOAD</div>
    </div>

    <div id="game-over-screen">
        <h1>ВЫ МЕРТВЫ</h1>
        <p>Уничтожено врагов: <span id="final-score">0</span></p>
        <button id="restart-btn">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        // === МАГИЯ АУДИО ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const SFX = {
            playNoise: (duration, freq) => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const bufferSize = audioCtx.sampleRate * duration; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = freq;
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
            },
            shootPistol: () => SFX.playNoise(0.15, 2000), 
            shootShotgun: () => SFX.playNoise(0.3, 500),  
            shootAuto: () => SFX.playNoise(0.1, 3000),    
            emptyClick: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(2000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            },
            reload: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            },
            enemyHit: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            },
            playerHurt: () => {
                SFX.playNoise(0.2, 300); 
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            },
            pickup: () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        };

        const tg = window.Telegram.WebApp;
        if (tg.setHeaderColor) { tg.setHeaderColor('#000000'); tg.setBackgroundColor('#000000'); }
        tg.expand(); if (tg.isVersionAtLeast("6.9")) tg.disableVerticalSwipes(); tg.enableClosingConfirmation();

        // === ИГРОВОЕ СОСТОЯНИЕ (ГЛАВНОЕ МЕНЮ) ===
        let gameState = 'menu'; // 'menu', 'playing', 'gameover'
        let playerHealth = 100; let kills = 0;
        
        document.getElementById('btn-pvp').addEventListener('pointerdown', () => alert("PvP Режим будет добавлен в следующем крупном обновлении!"));
        
        document.getElementById('btn-endless').addEventListener('pointerdown', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (tg.requestFullscreen && !tg.isFullscreen) tg.requestFullscreen(); 
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            gameState = 'playing';
        });

        const healthBar = document.getElementById('health-bar'); const damageOverlay = document.getElementById('damage-overlay');
        const gameOverScreen = document.getElementById('game-over-screen'); const finalScore = document.getElementById('final-score');
        const killCounter = document.getElementById('kill-counter');

        function takeDamage(amount) {
            if (gameState !== 'playing') return; playerHealth -= amount; if (playerHealth < 0) playerHealth = 0;
            healthBar.style.width = playerHealth + '%';
            damageOverlay.style.opacity = 1; setTimeout(() => { damageOverlay.style.opacity = 0; }, 150);
            SFX.playerHurt(); 

            if (playerHealth === 0) {
                gameState = 'gameover'; finalScore.innerText = kills; gameOverScreen.style.opacity = 1; gameOverScreen.style.pointerEvents = 'auto';
                joyPointerId = null; lookPointerId = null; moveForward = 0; moveRight = 0;
            }
        }

        function heal(amount) {
            if (gameState !== 'playing') return; playerHealth += amount; if (playerHealth > 100) playerHealth = 100;
            healthBar.style.width = playerHealth + '%';
        }

        document.getElementById('restart-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); playerHealth = 100; healthBar.style.width = '100%'; kills = 0; killCounter.innerText = `УБИТО: 0`;
            weapons[0].reserve = 48; weapons[1].reserve = 18; weapons[2].reserve = 90;
            ammo = weapons[currentWeaponIdx].maxAmmo; isReloading = false; updateHUD();
            gameOverScreen.style.opacity = 0; gameOverScreen.style.pointerEvents = 'none';
            camera.position.set(0, playerHeight, 0); yaw = 0; pitch = 0;
            enemies.forEach(e => scene.remove(e)); enemies.length = 0;
            for(let i = 0; i < 10; i++) spawnEnemy();
            lootItems.forEach(item => scene.remove(item)); lootItems.length = 0; lastLootSpawn = Date.now();
            gameState = 'playing';
        });

        // === ОРУЖИЕ (ОТДАЧА УМЕНЬШЕНА В 2 РАЗА) ===
        const weapons =[
            { name: "ПИСТОЛЕТ", damage: 35, maxAmmo: 12, reserve: 48, recoil: 0.025, reloadTime: 1000, fireRate: 300, color: 0x888888, size:[0.08, 0.1, 0.3], sound: SFX.shootPistol },
            { name: "ДРОБОВИК", damage: 100, maxAmmo: 6, reserve: 18, recoil: 0.075, reloadTime: 2000, fireRate: 800, color: 0x333333, size:[0.15, 0.1, 0.5], sound: SFX.shootShotgun },
            { name: "АВТОМАТ", damage: 20, maxAmmo: 30, reserve: 90, recoil: 0.01, reloadTime: 1500, fireRate: 100, color: 0x2e4a2e, size:[0.1, 0.12, 0.45], sound: SFX.shootAuto }
        ];
        let currentWeaponIdx = 0; let ammo = weapons[0].maxAmmo; let isReloading = false; let lastFireTime = 0;
        const ammoDisplay = document.getElementById('ammo-display');

        function updateHUD() {
            if (isReloading) { ammoDisplay.innerText = `ПЕРЕЗАРЯДКА...`; ammoDisplay.style.color = "#ffaa00"; } 
            else { const w = weapons[currentWeaponIdx]; ammoDisplay.innerText = `${w.name}: ${ammo} | ${w.reserve}`; ammoDisplay.style.color = ammo === 0 ? "#ff5555" : "#ffffff"; }
        }
        updateHUD();

        document.getElementById('weapon-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (isReloading || gameState !== 'playing') return; 
            currentWeaponIdx = (currentWeaponIdx + 1) % weapons.length;
            ammo = weapons[currentWeaponIdx].maxAmmo; updateHUD(); buildWeaponModel(); SFX.reload();
        });

        document.getElementById('reload-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); const w = weapons[currentWeaponIdx];
            if (isReloading || ammo === w.maxAmmo || w.reserve <= 0 || gameState !== 'playing') return;
            let needed = w.maxAmmo - ammo; if (needed > w.reserve) needed = w.reserve; 
            isReloading = true; updateHUD(); weaponBasePos.y = -0.5; SFX.reload(); 
            setTimeout(() => { ammo += needed; w.reserve -= needed; isReloading = false; updateHUD(); weaponBasePos.y = -0.25; }, w.reloadTime);
        });

        // === 3D ДВИЖОК ===
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a0a0a); scene.fog = new THREE.FogExp2(0x0a0a0a, 0.04);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); scene.add(camera);
        const playerHeight = 1.6; camera.position.y = playerHeight;
        let velocityY = 0; let isGrounded = true; const gravity = -25; const jumpStrength = 10; 

        const weaponGroup = new THREE.Group(); const weaponBasePos = new THREE.Vector3(0.25, -0.25, -0.4); 
        weaponGroup.position.copy(weaponBasePos); camera.add(weaponGroup); 
        const muzzleFlash = new THREE.PointLight(0xffdd00, 0, 10); muzzleFlash.position.set(0, 0, -0.5); weaponGroup.add(muzzleFlash);

        let currentWeaponMesh;
        function buildWeaponModel() {
            if (currentWeaponMesh) weaponGroup.remove(currentWeaponMesh);
            const wInfo = weapons[currentWeaponIdx];
            const geo = new THREE.BoxGeometry(wInfo.size[0], wInfo.size[1], wInfo.size[2]);
            const mat = new THREE.MeshLambertMaterial({ color: wInfo.color });
            currentWeaponMesh = new THREE.Mesh(geo, mat); currentWeaponMesh.position.z = wInfo.size[2] / 2; weaponGroup.add(currentWeaponMesh);
        }
        buildWeaponModel();

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8); light.position.set(0, 20, 0); scene.add(light);

        function createTexture(type) {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64; const ctx = canvas.getContext('2d');
            if (type === 'floor') {
                ctx.fillStyle = '#3a2522'; ctx.fillRect(0,0,64,64); ctx.fillStyle = '#4a302c';
                for(let i=0; i<64; i+=16) for(let j=0; j<64; j+=16) if((i+j)%32===0) ctx.fillRect(i,j,16,16);
                ctx.strokeStyle = '#221513'; ctx.lineWidth = 2;
                for(let i=0; i<=64; i+=16) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,64); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(64,i); ctx.stroke(); }
            } else if (type === 'wall') {
                ctx.fillStyle = '#555'; ctx.fillRect(0,0,64,64); ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
                for(let y=0; y<64; y+=16) {
                    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(64,y); ctx.stroke(); let offset = (y/16)%2 === 0 ? 0 : 16;
                    for(let x=offset; x<64; x+=32) { ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+16); ctx.stroke(); }
                }
            } else if (type === 'enemy') {
                ctx.fillStyle = '#800000'; ctx.fillRect(0,0,64,64); 
                ctx.fillStyle = '#ff0000'; ctx.fillRect(12,20,12,8); ctx.fillRect(40,20,12,8); 
                ctx.fillStyle = '#000000'; ctx.fillRect(20,40,24,12); 
                ctx.fillStyle = '#ffffff'; ctx.fillRect(22,40,4,6); ctx.fillRect(38,40,4,6); 
                ctx.fillStyle = '#555555'; ctx.fillRect(0,0,64,8); 
            } else if (type === 'medkit') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,64,64); 
                ctx.fillStyle = '#00cc00'; ctx.fillRect(24,8,16,48); ctx.fillRect(8,24,48,16);
            } else if (type === 'ammo_box') {
                ctx.fillStyle = '#4a5d23'; ctx.fillRect(0,0,64,64); 
                ctx.fillStyle = '#ffd700'; ctx.fillRect(16,16,8,32); ctx.fillRect(32,16,8,32); ctx.fillRect(48,16,8,32);
            }
            const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter; return tex;
        }

        const texFloor = createTexture('floor'); texFloor.wrapS = THREE.RepeatWrapping; texFloor.wrapT = THREE.RepeatWrapping; texFloor.repeat.set(20, 20);
        const texWall = createTexture('wall'); texWall.wrapS = THREE.RepeatWrapping; texWall.wrapT = THREE.RepeatWrapping;
        const texEnemy = createTexture('enemy'); const texMedkit = createTexture('medkit'); const texAmmo = createTexture('ammo_box');

        const arenaSize = 60;
        const floorGeo = new THREE.PlaneGeometry(arenaSize, arenaSize); const floorMat = new THREE.MeshLambertMaterial({ map: texFloor });
        const floor = new THREE.Mesh(floorGeo, floorMat); floor.rotation.x = -Math.PI / 2; scene.add(floor);

        const wallMat = new THREE.MeshLambertMaterial({ map: texWall }); texWall.repeat.set(arenaSize/4, 2); 
        const wallGeoH = new THREE.BoxGeometry(arenaSize, 8, 2); const wallGeoV = new THREE.BoxGeometry(2, 8, arenaSize);
        scene.add(new THREE.Mesh(wallGeoH, wallMat)).position.set(0, 4, -arenaSize/2); 
        scene.add(new THREE.Mesh(wallGeoH, wallMat)).position.set(0, 4, arenaSize/2); 
        scene.add(new THREE.Mesh(wallGeoV, wallMat)).position.set(-arenaSize/2, 4, 0); 
        scene.add(new THREE.Mesh(wallGeoV, wallMat)).position.set(arenaSize/2, 4, 0); 

        // === РАСПРЕДЕЛЕНИЕ КОЛОНН (СЕТКА + КОЛЛИЗИИ) ===
        const obstacles =[]; // Массив для проверки столкновений
        const pillarGeo = new THREE.BoxGeometry(4, 8, 4); const pillarMat = new THREE.MeshLambertMaterial({ map: texWall });
        const texPillar = texWall.clone(); texPillar.repeat.set(1, 2); pillarMat.map = texPillar; 
        
        // Расставляем колонны по всей карте сеткой с интервалом 10 метров
        for(let x = -20; x <= 20; x += 12) {
            for(let z = -20; z <= 20; z += 12) {
                // Оставляем центр карты чистым, чтобы игрок мог спавниться
                if(Math.abs(x) < 8 && Math.abs(z) < 8) continue;
                // Добавляем немного рандома, чтобы не было идеально ровно
                if(Math.random() > 0.3) {
                    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                    let px = x + (Math.random()-0.5)*4;
                    let pz = z + (Math.random()-0.5)*4;
                    pillar.position.set(px, 4, pz); 
                    scene.add(pillar);
                    obstacles.push(pillar); // Запоминаем для коллизий
                }
            }
        }

        // === ФУНКЦИЯ КОЛЛИЗИЙ ===
        // Проверяет, врезается ли точка (nx, nz) в колонну
        function checkCollision(nx, nz) {
            for(let p of obstacles) {
                let dx = nx - p.position.x;
                let dz = nz - p.position.z;
                // Если дистанция меньше 3 метров (радиус колонны 2 + радиус игрока 1)
                if(Math.sqrt(dx*dx + dz*dz) < 3.0) return true; 
            }
            return false;
        }

        // === ГУМАНОИДНЫЕ ВРАГИ ===
        const enemies =[]; 
        function spawnEnemy() {
            const enemyGroup = new THREE.Group();

            // Голова
            const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const headMat = new THREE.MeshLambertMaterial({ map: texEnemy });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.6; enemyGroup.add(head);

            // Туловище (броня)
            const torsoGeo = new THREE.BoxGeometry(1.0, 1.2, 0.6);
            const torsoMat = new THREE.MeshLambertMaterial({ color: 0x550000 }); // Темно красное
            const torso = new THREE.Mesh(torsoGeo, torsoMat);
            torso.position.y = 0.6; enemyGroup.add(torso);

            // Руки
            const armGeo = new THREE.BoxGeometry(0.3, 1.0, 0.3);
            const leftArm = new THREE.Mesh(armGeo, torsoMat); leftArm.position.set(-0.7, 0.8, 0); enemyGroup.add(leftArm);
            const rightArm = new THREE.Mesh(armGeo, torsoMat); rightArm.position.set(0.7, 0.8, 0); enemyGroup.add(rightArm);

            // Ноги (черные)
            const legGeo = new THREE.BoxGeometry(0.4, 1.0, 0.4);
            const legMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const leftLeg = new THREE.Mesh(legGeo, legMat); leftLeg.position.set(-0.3, -0.5, 0); enemyGroup.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, legMat); rightLeg.position.set(0.3, -0.5, 0); enemyGroup.add(rightLeg);

            // Смещаем всю группу вверх, чтобы ноги стояли на полу
            enemyGroup.position.y = 1.0;

            // Сохраняем ссылки для анимации и логики
            enemyGroup.userData = { head, torso, leftArm, rightArm, leftLeg, rightLeg, walkCycle: Math.random() * Math.PI * 2 };
            enemyGroup.health = 100; enemyGroup.lastAttack = 0; 
            
            // Связываем части тела с главной группой для стрельбы (Raycaster)
            head.enemyRef = enemyGroup; torso.enemyRef = enemyGroup; 
            leftArm.enemyRef = enemyGroup; rightArm.enemyRef = enemyGroup; 
            leftLeg.enemyRef = enemyGroup; rightLeg.enemyRef = enemyGroup;

            let ex, ez;
            do {
                ex = (Math.random() - 0.5) * (arenaSize - 4);
                ez = (Math.random() - 0.5) * (arenaSize - 4);
            } while (Math.abs(ex) < 15 && Math.abs(ez) < 15); // Не спавним близко к центру

            enemyGroup.position.set(ex, 1.0, ez);
            scene.add(enemyGroup); enemies.push(enemyGroup);
        }
        for(let i = 0; i < 10; i++) spawnEnemy();

        const lootItems =[]; let lastLootSpawn = Date.now();
        function spawnLoot() {
            if (lootItems.length > 6) return; 
            const isMedkit = Math.random() > 0.5;
            const item = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshLambertMaterial({ map: isMedkit ? texMedkit : texAmmo }));
            item.type = isMedkit ? 'medkit' : 'ammo';
            item.position.set((Math.random() - 0.5) * (arenaSize - 10), 0.6, (Math.random() - 0.5) * (arenaSize - 10));
            scene.add(item); lootItems.push(item);
        }

        const raycaster = new THREE.Raycaster(); const screenCenter = new THREE.Vector2(0, 0);
        let moveForward = 0; let moveRight = 0; let yaw = 0; let pitch = 0; 

        // === УПРАВЛЕНИЕ ===
        const joyLeft = document.getElementById('joy-left'); const joyStick = document.getElementById('joy-stick');
        let joyPointerId = null; let joyCenter = { x: 0, y: 0 };
        joyLeft.addEventListener('pointerdown', e => { e.preventDefault(); if(gameState !== 'playing') return; joyPointerId = e.pointerId; joyLeft.setPointerCapture(joyPointerId); const r = joyLeft.getBoundingClientRect(); joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 }; handleJoyMove(e); joyStick.style.transition='none'; });
        joyLeft.addEventListener('pointermove', e => { if(joyPointerId===e.pointerId){ e.preventDefault(); handleJoyMove(e); }});
        const resetJoy = e => { if(joyPointerId===e.pointerId){ e.preventDefault(); joyPointerId=null; joyStick.style.transition='transform 0.1s'; joyStick.style.transform=`translate(0,0)`; moveForward=0; moveRight=0; }};
        joyLeft.addEventListener('pointerup', resetJoy); joyLeft.addEventListener('pointercancel', resetJoy);
        function handleJoyMove(e) { if(gameState !== 'playing') return; let dx=e.clientX-joyCenter.x; let dy=e.clientY-joyCenter.y; let dist=Math.sqrt(dx*dx+dy*dy); if(dist>30){dx=(dx/dist)*30;dy=(dy/dist)*30;} joyStick.style.transform=`translate(${dx}px,${dy}px)`; moveRight=dx/30; moveForward=dy/30; }

        const lookZone = document.getElementById('look-zone'); let lookPointerId = null; let lastTouch = {x:0, y:0};
        lookZone.addEventListener('pointerdown', e => { e.preventDefault(); if(gameState !== 'playing') return; lookPointerId = e.pointerId; lookZone.setPointerCapture(lookPointerId); lastTouch = {x:e.clientX, y:e.clientY}; });
        lookZone.addEventListener('pointermove', e => { if(lookPointerId===e.pointerId){ e.preventDefault(); if(gameState !== 'playing') return; yaw-=(e.clientX-lastTouch.x)*0.005; pitch-=(e.clientY-lastTouch.y)*0.005; pitch=Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, pitch)); lastTouch={x:e.clientX, y:e.clientY}; }});
        const resetLook = e => { if(lookPointerId===e.pointerId){ e.preventDefault(); lookPointerId=null; }};
        lookZone.addEventListener('pointerup', resetLook); lookZone.addEventListener('pointercancel', resetLook);

        document.getElementById('jump-btn').addEventListener('pointerdown', e => { e.preventDefault(); if(isGrounded && gameState === 'playing'){velocityY=jumpStrength; isGrounded=false;} });

        document.getElementById('shoot-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault(); if (gameState !== 'playing' || isReloading) return;
            const now = Date.now(); const w = weapons[currentWeaponIdx];
            if (ammo <= 0) { if (now - lastFireTime > 300) { SFX.emptyClick(); lastFireTime = now; } return; }
            if (now - lastFireTime < w.fireRate) return; 
            
            ammo--; lastFireTime = now; updateHUD();
            pitch += w.recoil; yaw += (Math.random() - 0.5) * w.recoil * 0.5;
            weaponGroup.position.z += 0.15; weaponGroup.rotation.x += 0.2; muzzleFlash.intensity = 2;
            w.sound(); 

            raycaster.setFromCamera(screenCenter, camera);
            // Проверяем пересечение рекурсивно, так как враги теперь состоят из кучи мелких частей
            const intersects = raycaster.intersectObjects(enemies, true); 
            if (intersects.length > 0) {
                // Находим родительскую группу врага по ссылке
                const hitEnemy = intersects[0].object.enemyRef; 
                if (!hitEnemy) return; // На всякий случай

                hitEnemy.health -= w.damage;
                
                // Мигание частей тела при попадании
                hitEnemy.children.forEach(c => { if(!c.material.map) c.material.color.setHex(0xffffff); });
                setTimeout(() => { 
                    if(hitEnemy.parent) {
                        hitEnemy.children.forEach(c => {
                            if(c.material.map) return; // Не красим голову
                            if(c === hitEnemy.userData.leftLeg || c === hitEnemy.userData.rightLeg) c.material.color.setHex(0x111111);
                            else c.material.color.setHex(0x550000);
                        });
                    }
                }, 100);
                SFX.enemyHit();

                if (hitEnemy.health <= 0) {
                    scene.remove(hitEnemy); enemies.splice(enemies.indexOf(hitEnemy), 1);
                    kills++; killCounter.innerText = `УБИТО: ${kills}`; spawnEnemy();
                }
            }
        });

        // === ИГРОВОЙ ЦИКЛ ===
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const now = Date.now();

            if (gameState === 'playing') {
                weaponGroup.position.lerp(weaponBasePos, 0.15); weaponGroup.rotation.x = THREE.MathUtils.lerp(weaponGroup.rotation.x, 0, 0.15);
                if (muzzleFlash.intensity > 0) muzzleFlash.intensity -= delta * 15; 

                if (now - lastLootSpawn > 5000) { spawnLoot(); lastLootSpawn = now; }

                for (let i = lootItems.length - 1; i >= 0; i--) {
                    const item = lootItems[i]; item.rotation.y += 2 * delta; item.rotation.x += 1 * delta;
                    if (camera.position.distanceTo(item.position) < 1.5) {
                        SFX.pickup(); 
                        if (item.type === 'medkit') heal(40); 
                        else { weapons[currentWeaponIdx].reserve += weapons[currentWeaponIdx].maxAmmo * 2; updateHUD(); }
                        scene.remove(item); lootItems.splice(i, 1);
                    }
                }

                // === ЛОГИКА ВРАГОВ С РАЗДЕЛЕНИЕМ ===
                enemies.forEach((enemy, index) => {
                    enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
                    const distToPlayer = camera.position.distanceTo(enemy.position);

                    // Алгоритм Разделения (чтобы враги не слипались друг с другом)
                    let pushX = 0; let pushZ = 0;
                    for (let j = 0; j < enemies.length; j++) {
                        if (index === j) continue;
                        let other = enemies[j];
                        let dx = enemy.position.x - other.position.x;
                        let dz = enemy.position.z - other.position.z;
                        let distBetween = Math.sqrt(dx*dx + dz*dz);
                        // Если другой враг слишком близко - отталкиваемся от него
                        if (distBetween < 2.0 && distBetween > 0) {
                            pushX += (dx / distBetween) * 0.1;
                            pushZ += (dz / distBetween) * 0.1;
                        }
                    }

                    if (distToPlayer > 2.0) {
                        const dir = new THREE.Vector3(); dir.subVectors(camera.position, enemy.position).normalize(); 
                        
                        // Добавляем к вектору движения вектор отталкивания от других врагов
                        let moveX = dir.x * 2.8 * delta + pushX;
                        let moveZ = dir.z * 2.8 * delta + pushZ;
                        
                        enemy.position.x += moveX;
                        enemy.position.z += moveZ;

                        // Анимация ходьбы Гуманоида
                        enemy.userData.walkCycle += 10 * delta;
                        let walk = Math.sin(enemy.userData.walkCycle) * 0.5;
                        enemy.userData.leftArm.rotation.x = walk;
                        enemy.userData.rightArm.rotation.x = -walk;
                        enemy.userData.leftLeg.rotation.x = -walk;
                        enemy.userData.rightLeg.rotation.x = walk;
                    } else {
                        if (now - enemy.lastAttack > 1000) {
                            takeDamage(15); enemy.lastAttack = now;
                            enemy.userData.torso.position.z += 0.5; setTimeout(() => { if(enemy.parent) enemy.userData.torso.position.z -= 0.5; }, 100);
                        }
                    }
                });

                velocityY += gravity * delta; camera.position.y += velocityY * delta;
                if (camera.position.y <= playerHeight) { camera.position.y = playerHeight; velocityY = 0; isGrounded = true; }

                const euler = new THREE.Euler(0, 0, 0, 'YXZ'); euler.x = pitch; euler.y = yaw; camera.quaternion.setFromEuler(euler);

                const speed = 7 * delta;
                const direction = new THREE.Vector3(); camera.getWorldDirection(direction); direction.y = 0; direction.normalize();
                const rightVector = new THREE.Vector3(); rightVector.crossVectors(direction, camera.up).normalize();

                if (isGrounded && (Math.abs(moveForward) > 0.1 || Math.abs(moveRight) > 0.1)) {
                    const time = Date.now() * 0.005; weaponGroup.position.y = weaponBasePos.y + Math.sin(time) * 0.02; weaponGroup.position.x = weaponBasePos.x + Math.cos(time) * 0.01;
                }

                // Рассчитываем следующую позицию
                let nextX = camera.position.x - moveForward * speed * direction.x + moveRight * speed * rightVector.x;
                let nextZ = camera.position.z - moveForward * speed * direction.z + moveRight * speed * rightVector.z;
                
                // Проверяем коллизии (разбиваем на 2 проверки, чтобы игрок мог "скользить" вдоль стен)
                if (!checkCollision(nextX, camera.position.z)) camera.position.x = nextX;
                if (!checkCollision(camera.position.x, nextZ)) camera.position.z = nextZ;
                
                // Проверка границ арены
                const bound = (arenaSize / 2) - 1.5;
                if (camera.position.x > bound) camera.position.x = bound; if (camera.position.x < -bound) camera.position.x = -bound;
                if (camera.position.z > bound) camera.position.z = bound; if (camera.position.z < -bound) camera.position.z = -bound;
            }

            renderer.render(scene, camera);
        }

        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
